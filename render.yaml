services:
  - type: web
    name: jet-bridge
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_ENGINE
        value: postgresql
      - key: DATABASE_HOST
        fromDatabase:
          name: jet-bridge-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: jet-bridge-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: jet-bridge-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: jet-bridge-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: jet-bridge-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: jet-bridge-db
          property: connectionString

databases:
  - name: jet-bridge-db
    plan: free
    region: singapore