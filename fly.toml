# fly.toml app configuration file generated for jet-bridge-fi on 2026-05-10T08:16:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jet-bridge-fi'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8888'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 32768
