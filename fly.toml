app = "jet-bridge-app"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8888"
  HOST = "0.0.0.0"
  NODE_ENV = "production"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
