app = "jet-bridge-fi"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8888"
  HOST = "0.0.0.0"
  NODE_ENV = "production"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
