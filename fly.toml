app = "jet-bridge-fi"
primary_region = "sin"

[build]
  image = "jetadmin/jetbridge:latest"

[env]
  PORT = "8888"
  HOST = "0.0.0.0"
  NODE_ENV = "production"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 8888

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
